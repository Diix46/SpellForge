name: CI

# PRs only: validate before merge. Pushes to main are handled by release.yml
# (which runs the same lint/typecheck/build before cutting a release), so we
# don't duplicate the work here.
on:
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      # `npm ci` is reproducible from package-lock.json and runs the
      # `postinstall` (nuxt prepare) hook that generates .nuxt types — which
      # the lint and typecheck steps need.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
